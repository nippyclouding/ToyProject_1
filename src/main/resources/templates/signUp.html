<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>회원가입</title>
    <!-- Bootstrap CSS 링크 (친구의 경로에 맞게 수정해주세요) -->
    <link th:href="@{/css/bootstrap.min.css}"
          href="/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container {
            max-width: 450px; /* 회원가입 폼은 로그인보다 조금 더 넓게 */
            margin-top: 50px; /* 상단 여백 추가 */
        }
        .form-group {
            margin-bottom: 15px; /* 입력 필드 간 간격 */
        }
        .field-error {
            border-color: #dc3545;
            color: #dc3545;
            font-size: 0.875em;
            margin-top: 0.25rem;
        }
        .form-control.field-error {
            border-color: #dc3545;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="py-3 text-center">
        <h2>회원가입</h2>
    </div>

    <form th:action="@{/sign/signUpRedirect}" method="post" th:object="${member}">

        <!-- 글로벌 오류 메시지 표시 영역 -->
        <div th:if="${#fields?.hasGlobalErrors()}" class="alert alert-danger" role="alert">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">글로벌 오류 메시지</p>
        </div>

        <!-- 아이디 입력 필드 -->
        <div class="form-group">
            <label for="id">아이디</label>
            <input type="text" id="id" th:field="*{id}"
                   th:errorclass="field-error" class="form-control" placeholder="아이디를 입력하세요" required>
            <div class="field-error" th:errors="*{id}">
                아이디 오류
            </div>
        </div>

        <!-- 비밀번호 입력 필드 -->
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" th:field="*{password}"
                   th:errorclass="field-error" class="form-control" placeholder="비밀번호를 입력하세요" required>
            <div class="field-error" th:errors="*{password}">
                비밀번호 오류
            </div>
        </div>

        <!-- 이름 입력 필드 -->
        <div class="form-group">
            <label for="name">이름</label>
            <input type="text" id="name" th:field="*{name}"
                   th:errorclass="field-error" class="form-control" placeholder="이름을 입력하세요" required>
            <div class="field-error" th:errors="*{name}">
                이름 오류
            </div>
        </div>

        <!-- 나이 입력 필드 -->
        <div class="form-group">
            <label for="age">나이</label>
            <input type="number" id="age" th:field="*{age}"
                   th:errorclass="field-error" class="form-control" placeholder="나이를 입력하세요" required>
            <div class="field-error" th:errors="*{age}">
                나이 오류
            </div>
        </div>

        <hr class="my-4">

        <div class="row">
            <div class="col">
                <!-- 회원가입 버튼 -->
                <button class="w-100 btn btn-primary btn-lg" type="submit">회원가입</button>
            </div>
            <div class="col">
                <!-- 취소 버튼: /sign 경로로 이동 -->
                <a href="#" class="w-100 btn btn-secondary btn-lg" th:href="@{/sign}">취소</a>
            </div>
        </div>

    </form> <!-- ✨ 하나의 <form> 태그만 닫힙니다. -->

</div> <!-- /container -->
<!-- ... (나머지 HTML 코드) ... -->

    </form>
</div> <!-- /container -->
</body>
</html>
